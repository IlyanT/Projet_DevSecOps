name: Pipeline DevSecOps - Projet 5DVSCOPS

on: [push]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # PARTIE 3 : Scan des dépendances (requirements.txt)
      - name: Trivy Dependency Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          severity: 'HIGH,CRITICAL'

      # PARTIE 2 : Build de l'image (requis pour le scan d'image)
      - name: Build Docker Image
        run: docker build -t devsecops-app:${{ github.sha }} .

      # PARTIE 3 : Scan de l'image Docker
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-app:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
