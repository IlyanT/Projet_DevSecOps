name: Pipeline DevSecOps
on: [push]
jobs:
  devsecops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Yaml Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .

      - name: Trivy FS Scan (Partie 3)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'

      - name: Build Docker Image (Partie 2)
        run: docker build -t devsecops-app:${{ github.sha }} .

      - name: Trivy Image Scan (Partie 3)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-app:${{ github.sha }}'
          severity: 'CRITICAL'

      - name: Conftest Scan (Partie 4)
        uses: instrumenta/conftest-action@master
        with:
          policy: policy/
          file: k8s-deployment.yaml
